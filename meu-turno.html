<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Órion · Meu Turno</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f12;--surface:#14171c;--surface2:#1c2028;--surface3:#222630;
  --border:#252930;--text:#e8eaf0;--muted:#6b7280;
  --accent:#e8ff47;--ok:#47ffb2;--danger:#ff4747;--warn:#ff8c47;--info:#47d4ff;
  --font-head:'Syne',sans-serif;--font-mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px}

/* TELAS */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── LOGIN ── */
#screen-login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:28px 20px}
#screen-login.active{display:flex}
.logo{font-family:var(--font-head);font-weight:800;font-size:22px;letter-spacing:-0.5px;margin-bottom:32px;color:var(--muted)}
.logo span{color:var(--accent)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:360px}
.login-title{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:11px;color:var(--muted);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--font-mono);font-size:13px;outline:none;transition:border-color 0.15s}
.form-input:focus{border-color:var(--accent2,#47d4ff)}
.form-input::placeholder{color:var(--muted)}
.btn-login{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#0d0f12;font-family:var(--font-head);font-size:16px;font-weight:700;cursor:pointer;transition:background 0.15s;margin-top:8px}
.btn-login:hover{background:#d4eb30}
.btn-login:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed}
.login-erro{color:var(--danger);font-size:11px;margin-top:10px;text-align:center;display:none}

/* ── APP (pós-login) ── */
#screen-app{display:none;flex-direction:column;min-height:100vh}
#screen-app.active{display:flex}

.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.app-logo{font-family:var(--font-head);font-weight:800;font-size:18px;letter-spacing:-0.5px}
.app-logo span{color:var(--accent)}
.app-user{display:flex;align-items:center;gap:8px}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;font-family:var(--font-head);color:var(--muted)}
.user-name{font-size:12px;color:var(--muted)}
.btn-logout{font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.btn-logout:hover{color:var(--danger);border-color:rgba(255,71,71,0.3)}

.app-body{padding:20px;flex:1}

/* CARDS DE TURNO */
.turno-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.turno-card.urgente{border-color:rgba(255,71,71,0.5);background:rgba(255,71,71,0.04)}
.turno-card.confirmado{border-color:rgba(71,255,178,0.3)}
.turno-card.presente{border-color:rgba(71,255,178,0.5);background:rgba(71,255,178,0.04)}

.turno-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.turno-dia{font-family:var(--font-head);font-size:18px;font-weight:700;line-height:1.1}
.turno-data{font-size:11px;color:var(--muted);margin-top:2px}

.fase-pill{font-size:9px;text-transform:uppercase;letter-spacing:0.06em;padding:4px 10px;border-radius:20px;border:1px solid;white-space:nowrap}
.fase-notif1{background:rgba(71,212,255,0.1);color:var(--info);border-color:rgba(71,212,255,0.25)}
.fase-confirmado{background:rgba(71,255,178,0.1);color:var(--ok);border-color:rgba(71,255,178,0.25)}
.fase-notif2{background:rgba(232,255,71,0.1);color:var(--accent);border-color:rgba(232,255,71,0.25)}
.fase-urgente{background:rgba(255,71,71,0.12);color:var(--danger);border-color:rgba(255,71,71,0.4)}
.fase-presente{background:rgba(71,255,178,0.18);color:var(--ok);border-color:rgba(71,255,178,0.4)}
.fase-aguardando{background:rgba(107,114,128,0.1);color:var(--muted);border-color:var(--border)}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-item{background:var(--surface2);border-radius:8px;padding:10px 12px}
.info-item-label{font-size:9px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:3px}
.info-item-val{font-size:13px;font-weight:500;color:var(--text)}

/* BOTÕES DE AÇÃO */
.action-row{display:flex;flex-direction:column;gap:8px}
.btn-confirmar{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#0d0f12;font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s}
.btn-confirmar:hover{background:#d4eb30}
.btn-confirmar:active{transform:scale(0.98)}
.btn-recusar{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,71,71,0.3);background:rgba(255,71,71,0.08);color:var(--danger);font-family:var(--font-mono);font-size:12px;cursor:pointer;transition:all 0.15s}
.btn-recusar:hover{background:rgba(255,71,71,0.15)}
.btn-checkin{width:100%;padding:14px;border-radius:10px;border:none;background:var(--info);color:#0d0f12;font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-checkin:hover{background:#2dbde8}
.btn-neutro{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--font-mono);font-size:12px;cursor:pointer}

/* ESTADO VAZIO */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4}
.empty-title{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}

/* GPS */
.gps-loading{text-align:center;padding:16px;color:var(--info);font-size:12px}

/* TROCAR SENHA */
.senha-card{background:var(--surface);border:1px solid rgba(232,255,71,0.2);border-radius:14px;padding:20px;margin-bottom:16px}
.senha-title{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--accent);margin-bottom:4px}
.senha-sub{font-size:11px;color:var(--muted);margin-bottom:14px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text);z-index:300;opacity:0;transition:all 0.3s ease;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:rgba(71,255,178,0.4)}
.toast.danger{border-color:rgba(255,71,71,0.5);background:rgba(20,5,5,0.95);color:var(--danger)}
.toast.warn{border-color:rgba(255,140,71,0.4)}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div class="screen active" id="screen-login">
  <div class="logo">órion<span>·</span>escala</div>
  <div class="login-card">
    <div class="login-title">Entrar</div>
    <div class="login-sub">Use o email e senha fornecidos pelo supervisor.</div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" type="email" id="input-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" id="input-senha" placeholder="••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-entrar" onclick="fazerLogin()">Entrar</button>
    <div class="login-erro" id="login-erro"></div>
  </div>
</div>

<!-- APP PÓS-LOGIN -->
<div class="screen" id="screen-app">
  <div class="app-header">
    <div class="app-logo">órion<span>·</span>escala</div>
    <div class="app-user">
      <div class="user-avatar" id="user-avatar">??</div>
      <span class="user-name" id="user-name">—</span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="app-body" id="app-body">
    <div class="gps-loading"><span class="spin">⟳</span> Carregando seus turnos...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API = 'http://localhost:3001/api'; // troca pela URL do servidor em produção

// ─── AUTH ────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('orion_token'); }
function getUser()  { try { return JSON.parse(localStorage.getItem('orion_user')); } catch { return null; } }

async function fazerLogin() {
  const email = document.getElementById('input-email').value.trim();
  const senha = document.getElementById('input-senha').value;
  const btn   = document.getElementById('btn-entrar');
  const erro  = document.getElementById('login-erro');

  if (!email || !senha) { mostrarErro('Preencha e-mail e senha.'); return; }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  erro.style.display = 'none';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.erro || 'Erro ao entrar');

    localStorage.setItem('orion_token', data.token);
    localStorage.setItem('orion_user', JSON.stringify(data.usuario));
    entrarNoApp(data.usuario);
  } catch (e) {
    mostrarErro(e.message);
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

function mostrarErro(msg) {
  const el = document.getElementById('login-erro');
  el.textContent = msg;
  el.style.display = 'block';
}

function logout() {
  localStorage.removeItem('orion_token');
  localStorage.removeItem('orion_user');
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('input-senha').value = '';
}

function entrarNoApp(usuario) {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');

  const ini = (usuario.nome || '??').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('user-avatar').textContent = ini;
  document.getElementById('user-name').textContent = usuario.apelido || usuario.nome.split(' ')[0];

  carregarTurnos();
}

// ─── FETCH COM TOKEN ─────────────────────────────────────────────────────────
async function api(path, opts={}) {
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

// ─── TURNOS ──────────────────────────────────────────────────────────────────
const DIAS_NOMES = { dom:'Domingo',seg:'Segunda',ter:'Terça',qua:'Quarta',qui:'Quinta',sex:'Sexta',sab:'Sábado' };
const FASE_INFO = {
  aguardando:  { label:'Aguardando publicação', cls:'fase-aguardando' },
  notif1:      { label:'Confirme sua escala',   cls:'fase-notif1' },
  confirmado1: { label:'Escala confirmada',      cls:'fase-confirmado' },
  notif2:      { label:'Confirme sua presença', cls:'fase-notif2' },
  presente:    { label:'Presença confirmada',   cls:'fase-presente' },
  urgente:     { label:'URGENTE',               cls:'fase-urgente' },
};

async function carregarTurnos() {
  const data = await api('/escalas/meu-turno');
  const usuario = getUser();
  const body = document.getElementById('app-body');

  if (!data) return;

  // Agrupa horas em turnos contínuos
  const turnos = agruparTurnos(data);

  let html = '';

  // Banner de senha inicial
  if (usuario?.senha_inicial) {
    html += `<div class="senha-card">
      <div class="senha-title">Troque sua senha</div>
      <div class="senha-sub">Você está usando a senha inicial. Por segurança, defina uma senha pessoal.</div>
      ${formTrocarSenha()}
    </div>`;
  }

  if (turnos.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-icon">📅</div>
      <div class="empty-title">Nenhum turno escalado</div>
      <div>Você ainda não foi escalado(a) para esta semana.</div>
    </div>`;
  } else {
    html += turnos.map(t => renderTurno(t)).join('');
  }

  body.innerHTML = html;
}

function agruparTurnos(escalas) {
  // Agrupa escalas com hora_idx consecutivos no mesmo dia em um turno
  const grupos = [];
  const sorted = [...escalas].sort((a,b) => {
    const dias = ['dom','seg','ter','qua','qui','sex','sab'];
    const dDiff = dias.indexOf(a.dia_semana) - dias.indexOf(b.dia_semana);
    return dDiff !== 0 ? dDiff : a.hora_idx - b.hora_idx;
  });

  for (const e of sorted) {
    const last = grupos[grupos.length - 1];
    if (last && last.dia === e.dia_semana && last.idxFim === e.hora_idx - 1 && last.fase === e.fase) {
      last.idxFim = e.hora_idx;
      last.horaFim = e.hora;
      last.dur++;
      last.ids.push(e.id);
    } else {
      grupos.push({
        ids: [e.id],
        dia: e.dia_semana,
        data_inicio: e.data_inicio,
        horaInicio: e.hora,
        horaFim: e.hora,
        idxInicio: e.hora_idx,
        idxFim: e.hora_idx,
        dur: 1,
        fase: e.fase,
      });
    }
  }
  return grupos;
}

function fimTurno(hora) {
  const [h] = hora.split(':').map(Number);
  return String((h+1)%24).padStart(2,'0') + ':00';
}

function renderTurno(t) {
  const fi = FASE_INFO[t.fase] || FASE_INFO.aguardando;
  const diaLabel = DIAS_NOMES[t.dia] || t.dia;
  const semana = t.data_inicio ? t.data_inicio.slice(5).replace('-','/') : '';
  const fimDisp = fimTurno(t.horaFim);
  const idPrincipal = t.ids[0];

  let acoes = '';
  if (t.fase === 'notif1') {
    acoes = `
      <div class="action-row">
        <button class="btn-confirmar" onclick="confirmarTurno(${idPrincipal})">✓ Confirmar escala</button>
        <button class="btn-recusar" onclick="recusarTurno(${idPrincipal})">Não consigo trabalhar neste turno</button>
      </div>`;
  } else if (t.fase === 'notif2') {
    acoes = `
      <div class="action-row">
        <button class="btn-confirmar" onclick="confirmarPresenca(${idPrincipal})">✓ Confirmarei minha presença</button>
        <button class="btn-recusar" onclick="recusarTurno(${idPrincipal})">Não consigo comparecer</button>
      </div>`;
  } else if (t.fase === 'confirmado1') {
    acoes = `
      <div class="action-row">
        <button class="btn-checkin" onclick="fazerCheckin(${idPrincipal})">
          <span>📍</span> Fazer check-in ao chegar
        </button>
        <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px">O check-in valida sua presença via GPS</div>
      </div>`;
  } else if (t.fase === 'urgente') {
    acoes = `<div style="font-size:12px;color:var(--danger);padding:10px;background:rgba(255,71,71,0.08);border-radius:8px;text-align:center">
      O supervisor foi notificado sobre este turno.
    </div>`;
  } else if (t.fase === 'presente') {
    acoes = `<div style="font-size:12px;color:var(--ok);padding:10px;background:rgba(71,255,178,0.08);border-radius:8px;text-align:center">
      ✓ Check-in registrado. Bom turno!
    </div>`;
  }

  return `<div class="turno-card ${t.fase === 'urgente' ? 'urgente' : t.fase === 'presente' ? 'presente' : t.fase === 'confirmado1' ? 'confirmado' : ''}">
    <div class="turno-header">
      <div>
        <div class="turno-dia">${diaLabel}</div>
        <div class="turno-data">Semana de ${semana}</div>
      </div>
      <span class="fase-pill ${fi.cls}">${fi.label}</span>
    </div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-item-label">Horário</div>
        <div class="info-item-val">${t.horaInicio} → ${fimDisp}</div>
      </div>
      <div class="info-item">
        <div class="info-item-label">Duração</div>
        <div class="info-item-val">${t.dur}h de turno</div>
      </div>
    </div>
    ${acoes}
  </div>`;
}

// ─── AÇÕES ───────────────────────────────────────────────────────────────────
async function confirmarTurno(id) {
  const data = await api(`/escalas/${id}/confirmar`, { method:'POST' });
  if (data?.ok) { showToast(data.mensagem, 'ok'); carregarTurnos(); }
  else showToast(data?.erro || 'Erro ao confirmar', 'danger');
}

async function recusarTurno(id) {
  if (!confirm('Tem certeza que não pode comparecer? O supervisor será notificado.')) return;
  const data = await api(`/escalas/${id}/recusar`, { method:'POST' });
  if (data?.ok) { showToast(data.mensagem, 'warn'); carregarTurnos(); }
  else showToast(data?.erro || 'Erro ao recusar', 'danger');
}

async function confirmarPresenca(id) {
  const data = await api(`/escalas/${id}/confirmar-presenca`, { method:'POST' });
  if (data?.ok) { showToast(data.mensagem, 'ok'); carregarTurnos(); }
  else showToast(data?.erro || 'Erro', 'danger');
}

async function fazerCheckin(id) {
  if (!navigator.geolocation) { showToast('GPS não disponível neste dispositivo', 'danger'); return; }
  showToast('⟳ Obtendo sua localização...', 'warn');

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const data = await api(`/escalas/${id}/checkin`, {
        method: 'POST',
        body: JSON.stringify({ lat: pos.coords.latitude, lng: pos.coords.longitude })
      });
      if (data?.ok) { showToast(data.mensagem, 'ok'); carregarTurnos(); }
      else {
        const msg = data?.erro === 'Fora do raio permitido'
          ? `Você está a ${data.distancia_m}m do estabelecimento (máx ${data.raio_m}m)`
          : data?.erro || 'Erro no check-in';
        showToast(msg, 'danger');
      }
    },
    () => showToast('Permissão de GPS negada. Ative a localização e tente novamente.', 'danger'),
    { enableHighAccuracy: true, timeout: 12000 }
  );
}

// ─── TROCAR SENHA ────────────────────────────────────────────────────────────
function formTrocarSenha() {
  return `<div>
    <div class="form-group">
      <label class="form-label">Senha atual</label>
      <input class="form-input" type="password" id="ts-atual" placeholder="••••••">
    </div>
    <div class="form-group">
      <label class="form-label">Nova senha (mín. 6 caracteres)</label>
      <input class="form-input" type="password" id="ts-nova" placeholder="••••••">
    </div>
    <button class="btn-neutro" onclick="trocarSenha()" style="margin-top:4px">Salvar nova senha</button>
  </div>`;
}

async function trocarSenha() {
  const atual = document.getElementById('ts-atual')?.value;
  const nova  = document.getElementById('ts-nova')?.value;
  if (!atual || !nova) { showToast('Preencha os dois campos', 'warn'); return; }
  const data = await api('/auth/trocar-senha', {
    method: 'POST', body: JSON.stringify({ senha_atual: atual, nova_senha: nova })
  });
  if (data?.ok) {
    showToast('Senha alterada com sucesso!', 'ok');
    const u = getUser();
    delete u.senha_inicial;
    localStorage.setItem('orion_user', JSON.stringify(u));
    setTimeout(carregarTurnos, 1500);
  } else showToast(data?.erro || 'Erro ao trocar senha', 'danger');
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 4000);
}

// Enter no login
document.getElementById('input-senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});

// Auto-login se já tem token
window.addEventListener('DOMContentLoaded', () => {
  const token = getToken();
  const user  = getUser();
  if (token && user) entrarNoApp(user);
});
</script>
</body>
</html>
